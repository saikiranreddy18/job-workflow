name: Job Alert - Run Every 6 Hours

on:
  schedule:
    - cron: '0 */6 * * *'   # runs at 00:00, 06:00, 12:00, 18:00 UTC = 4 times daily
  workflow_dispatch:          # also lets you trigger manually anytime

jobs:
  run-job-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Restore seen jobs cache
        uses: actions/cache@v3
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      - name: Run job alert script
        env:
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_APP_PASSWORD: ${{ secrets.ALERT_APP_PASSWORD }}
        run: python job_alert.py

      - name: Save seen jobs cache
        uses: actions/cache/save@v3
        if: always()
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
